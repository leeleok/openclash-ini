[custom]
enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/leeleok/openclash-ini/main/mysetting.yaml
;==============================
;代理组
;==============================
custom_proxy_group=节点选择`select`[]自动选择`[]手动选择`.*
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=手动选择`select`[]香港节点`[]狮城节点`[]日本节点`[]美国节点`.*
;==============================
;地区自动测速
;==============================
custom_proxy_group=香港节点`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=狮城节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,150
;==============================
;服务分组
;==============================
custom_proxy_group=苹果服务`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=YouTube`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=微软云盘`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=微软服务`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=EPIC`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=Steam`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=EA`select`[]节点选择`[]自动选择`[]DIRECT`.*
custom_proxy_group=Telegram`select`[]节点选择`[]自动选择`[]DIRECT`.*
;==============================
;规则
;==============================
ruleset=REJECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
ruleset=苹果服务,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Apple.yaml
ruleset=Steam,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Steam.yaml
ruleset=节点选择,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/OpenAI.yaml
ruleset=微软云盘,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/OneDrive.yaml
ruleset=微软服务,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Microsoft.yaml
ruleset=EPIC,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/EPIC.yaml
ruleset=节点选择,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Origin.yaml
ruleset=节点选择,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Discord.yaml
ruleset=YouTube,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/YouTube.yaml
ruleset=Telegram,https://raw.githubusercontent.com/leeleok/openclash-ini/main/rules/classical/Telegram.yaml
;Google
ruleset=节点选择,[]GEOSITE,GOOGLE
ruleset=节点选择,[]GEOSITE,GOOGLE-CN
ruleset=节点选择,[]GEOIP,GOOGLE
;GFW
ruleset=节点选择,[]GEOSITE,GREATFIRE
;国内直连
ruleset=DIRECT,[]GEOSITE,PRIVATE
ruleset=DIRECT,[]GEOIP,PRIVATE
ruleset=DIRECT,[]GEOIP,CN
ruleset=DIRECT,[]GEOSITE,CN
;漏网
ruleset=节点选择,[]FINAL

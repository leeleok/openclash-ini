proxies: []

proxy-groups:
  - name: 量大专用
    type: select
    proxies:
      - DIRECT

  - name: 日常选择
    type: select
    proxies:
      - DIRECT

  - name: 自动切换
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 30
    proxies:
      - DIRECT

  - name: 节点选择
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 30
    proxies:
      - 日常选择
      - 自动切换
      - 量大专用
      - DIRECT

  - name: 手动选择
    type: select
    proxies:
      - 日常选择
      - 量大专用
      - 自动切换
      - DIRECT

  - {name: YouTube, type: select, proxies: [节点选择, DIRECT]}
  - {name: 微软云盘, type: select, proxies: [节点选择, DIRECT]}
  - {name: 微软服务, type: select, proxies: [节点选择, DIRECT]}
  - {name: 苹果服务, type: select, proxies: [节点选择, DIRECT]}
  - {name: EPIC, type: select, proxies: [节点选择, DIRECT]}
  - {name: Steam, type: select, proxies: [节点选择, DIRECT]}
  - {name: EA, type: select, proxies: [节点选择, DIRECT]}
  - {name: PikPak, type: select, proxies: [节点选择, DIRECT]}
